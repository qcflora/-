<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公文整合助手</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css?v=3">
  <link rel="stylesheet" href="css/editor.css">
  <link rel="stylesheet" href="css/print.css" media="print">
  <!-- 第三方库 -->
  <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- 左侧深紫色侧边栏 -->
    <aside id="navbar" class="sidebar">
      <!-- 品牌区 -->
      <div class="nav-brand">
        <span class="logo-icon">&#128196;</span>
        <span class="logo-text">公文整合助手</span>
      </div>

      <!-- 导航菜单 -->
      <nav class="nav-tabs">
        <button class="nav-tab active" data-page="projects" onclick="app.navigate('projects')">
          <span class="tab-icon">&#128193;</span> <span class="tab-label">项目列表</span>
        </button>
        <button class="nav-tab" data-page="chatpaste" onclick="app.navigate('chatpaste')">
          <span class="tab-icon">&#129302;</span> <span class="tab-label">对话粘贴</span>
        </button>
        <button class="nav-tab" data-page="upload" onclick="app.navigate('upload')">
          <span class="tab-icon">&#128228;</span> <span class="tab-label">素材整合</span>
        </button>
        <button class="nav-tab" data-page="templates" onclick="app.navigate('templates')">
          <span class="tab-icon">&#128220;</span> <span class="tab-label">模板库</span>
        </button>
        <button class="nav-tab" data-page="ai-demo" onclick="app.navigate('ai-demo')">
          <span class="tab-icon">&#129302;</span> <span class="tab-label">AI 试用</span>
        </button>
        <button class="nav-tab" data-page="settings" onclick="app.navigate('settings')">
          <span class="tab-icon">&#9881;</span> <span class="tab-label">设置</span>
        </button>
      </nav>

      <!-- 底部操作 -->
      <div class="nav-actions">
        <input type="file" id="import-json-input" accept=".json" hidden onchange="jsonImporter.handleImport(event)">
        <button class="btn btn-primary" onclick="document.getElementById('import-json-input').click()">
          <span class="btn-icon">&#8593;</span> 导入 JSON
        </button>
      </div>
    </aside>

    <!-- 右侧主区域 -->
    <div class="main-area">
      <!-- 顶部栏 -->
      <header class="topbar">
        <div class="topbar-left"></div>
        <div class="topbar-right">
          <span id="status-text" class="topbar-status">就绪</span>
          <span id="status-version" class="topbar-version">v1.0</span>
        </div>
      </header>

      <!-- 主内容滚动区 -->
      <main id="app-container" class="main-content"></main>
    </div>
  </div>

  <!-- JS 模块 -->
  <script src="js/data-store.js"></script>
  <script src="js/app.js"></script>
  <script src="js/project-manager.js"></script>
  <script src="js/template-library.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/exporter.js"></script>
  <script src="js/json-importer.js"></script>
  <script src="js/feishu-adapter.js"></script>
  <script src="js/custom-template.js"></script>
  <script src="js/version-compare.js"></script>
  <script src="js/material-upload.js"></script>
  <script src="js/merge-engine.js"></script>
  <script src="js/align-view.js"></script>
  <script src="js/chat-paste.js"></script>
</body>
</html>
